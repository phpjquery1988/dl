<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>DL Scanner</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
:root{--bg:#080a0e;--c:#0f1318;--c2:#151b24;--b:#1d2534;--a:#00e5ff;--a2:#7c3aed;--ok:#10b981;--warn:#f59e0b;--err:#ef4444;--tx:#dce0ec;--mu:#5a6580;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(0,229,255,.018) 39px,rgba(0,229,255,.018) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(0,229,255,.018) 39px,rgba(0,229,255,.018) 40px);pointer-events:none;z-index:0;}
.w{position:relative;z-index:1;max-width:520px;margin:0 auto;padding-bottom:60px;}

.hdr{display:flex;align-items:center;gap:14px;padding:20px 18px 15px;border-bottom:1px solid var(--b);}
.logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--a),var(--a2));display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;box-shadow:0 0 28px rgba(0,229,255,.18);}
.hdr-t{font-size:18px;font-weight:800;letter-spacing:-.4px;}
.hdr-s{font-size:11px;color:var(--mu);font-family:'JetBrains Mono',monospace;}

/* Drop zone */
.dz{margin:18px;border:2px dashed var(--b);border-radius:16px;padding:30px 18px;text-align:center;cursor:pointer;background:var(--c);transition:all .2s;position:relative;}
.dz:hover,.dz.over{border-color:var(--a);background:rgba(0,229,255,.04);}
.dz input{position:absolute;inset:0;opacity:0;cursor:pointer;}
.dz-ico{font-size:40px;margin-bottom:10px;}
.dz-t1{font-size:15px;font-weight:700;}
.dz-t2{font-size:11px;color:var(--mu);font-family:'JetBrains Mono',monospace;margin-top:4px;}

/* Preview */
.prev{margin:18px;display:none;}
.prev.show{display:block;}
.prev img{width:100%;border-radius:14px;border:1px solid var(--b);display:block;}
.btn-row{display:flex;gap:8px;margin-top:10px;}
.btn-ch{flex:1;background:var(--c2);border:1px solid var(--b);color:var(--mu);padding:12px;border-radius:10px;font-size:13px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:600;transition:all .2s;}
.btn-sc{flex:2;background:linear-gradient(135deg,var(--a),#00bcd4);color:#000;border:none;padding:12px;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 4px 20px rgba(0,229,255,.22);transition:all .2s;}
.btn-sc:disabled{background:var(--b);color:var(--mu);box-shadow:none;cursor:not-allowed;}

/* Progress bar */
.pg{margin:0 18px 14px;display:none;}
.pg.show{display:block;}
.pb{height:3px;background:var(--b);border-radius:3px;overflow:hidden;margin-bottom:8px;}
.pf{height:100%;width:0%;background:linear-gradient(90deg,var(--a2),var(--a));border-radius:3px;transition:width .35s ease;}
.steps{display:flex;flex-wrap:wrap;gap:5px;}
.step{font-size:9px;padding:2px 7px;border-radius:5px;background:var(--c);border:1px solid var(--b);color:var(--mu);font-family:'JetBrains Mono',monospace;transition:all .3s;}
.step.act{border-color:var(--a);color:var(--a);background:rgba(0,229,255,.07);}
.step.dn{border-color:var(--ok);color:var(--ok);background:rgba(16,185,129,.07);}

/* Error */
.err-box{display:none;margin:0 18px 14px;padding:14px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.22);border-radius:12px;}
.err-box.show{display:block;}
.err-t{font-size:14px;font-weight:700;color:var(--err);margin-bottom:6px;}
.err-m{font-size:12px;color:var(--mu);font-family:'JetBrains Mono',monospace;}

/* Source banner */
.src-banner{margin:0 18px 14px;padding:12px 14px;border-radius:12px;display:none;}
.src-banner.show{display:block;}
.src-banner.pdf417{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25);color:var(--ok);}
.src-banner.quality{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);color:var(--warn);}
.src-banner.ocr{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.18);color:var(--warn);}
.src-banner-top{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.src-banner-msg{font-size:13px;font-weight:600;flex:1;}
.field-count{font-size:20px;font-weight:800;font-family:'JetBrains Mono',monospace;}

/* Quality indicator */
.quality-bar{margin-top:10px;}
.qb-label{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--mu);margin-bottom:4px;display:flex;justify-content:space-between;}
.qb-track{height:6px;background:var(--b);border-radius:6px;overflow:hidden;}
.qb-fill{height:100%;border-radius:6px;transition:width .5s;}
.quality-tip{font-size:11px;color:var(--mu);font-family:'JetBrains Mono',monospace;margin-top:6px;line-height:1.5;}

/* Annotated card */
.ann-section{margin:0 18px 14px;}
.ann-lbl{font-size:10px;color:var(--mu);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px;}
.ann-img{width:100%;border-radius:12px;border:1px solid var(--b);display:block;}

/* PDF417 crop */
.pdf417-crop{margin:0 18px 14px;border-radius:12px;overflow:hidden;border:2px solid rgba(0,229,255,.35);background:#000;position:relative;display:none;}
.pdf417-crop.show{display:block;}
.pdf417-crop img{width:100%;display:block;}
.pdf417-tag{position:absolute;top:7px;left:8px;background:rgba(0,229,255,.92);color:#000;font-size:10px;font-weight:700;padding:2px 9px;border-radius:5px;font-family:'JetBrains Mono',monospace;}

/* Crops strip */
.crops-strip{display:flex;gap:8px;overflow-x:auto;padding:0 18px 4px;scrollbar-width:thin;}
.crop-card{flex-shrink:0;background:var(--c);border:1px solid var(--b);border-radius:10px;overflow:hidden;min-width:110px;}
.crop-img{width:100%;height:62px;object-fit:cover;display:block;}
.crop-lbl{font-size:9px;color:var(--mu);font-family:'JetBrains Mono',monospace;padding:3px 7px;background:var(--c2);text-align:center;}

/* Fields */
.fields-wrap{margin:0 18px;}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin:16px 0 8px;}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--mu);}
.copy-btn{font-size:11px;padding:4px 10px;border-radius:6px;background:transparent;border:1px solid var(--b);color:var(--mu);cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .2s;}
.copy-btn:hover{border-color:var(--a);color:var(--a);}
.fields-list{display:flex;flex-direction:column;gap:7px;}

/* Field card */
.fc{background:var(--c2);border:1px solid var(--b);border-radius:12px;padding:11px 13px;display:flex;align-items:flex-start;gap:11px;animation:fup .3s both;position:relative;}
@keyframes fup{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fc-ico{font-size:17px;flex-shrink:0;margin-top:1px;}
.fc-body{flex:1;min-width:0;}
.fc-lbl{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--mu);text-transform:uppercase;letter-spacing:.6px;margin-bottom:2px;}
.fc-val{font-size:15px;font-weight:600;word-break:break-word;}
.fc-val.hi{color:var(--a);font-family:'JetBrains Mono',monospace;}
.fc-val.ok{color:var(--ok);}
.src-tag{position:absolute;top:8px;right:10px;font-size:9px;padding:1px 6px;border-radius:4px;font-family:'JetBrains Mono',monospace;}
.src-tag.pdf417{background:rgba(0,229,255,.1);color:var(--a);border:1px solid rgba(0,229,255,.2);}
.src-tag.ocr{background:rgba(245,158,11,.1);color:var(--warn);border:1px solid rgba(245,158,11,.2);}
.src-tag.barcode,.src-tag.1d_barcode{background:rgba(16,185,129,.1);color:var(--ok);border:1px solid rgba(16,185,129,.2);}

/* Raw data */
.raw-wrap{margin:14px 18px 0;}
.raw-btn{width:100%;background:transparent;border:1px solid var(--b);color:var(--mu);padding:9px 13px;border-radius:8px;font-size:11px;cursor:pointer;font-family:'JetBrains Mono',monospace;text-align:left;transition:all .2s;}
.raw-btn:hover{border-color:var(--a2);}
.raw-pre{background:var(--c);border:1px solid var(--b);border-radius:8px;padding:12px;margin-top:6px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--mu);white-space:pre-wrap;word-break:break-all;max-height:220px;overflow-y:auto;display:none;line-height:1.6;}

/* Group dividers */
.grp-divider{font-size:10px;color:var(--mu);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.8px;margin:14px 0 6px;display:flex;align-items:center;gap:8px;}
.grp-divider::after{content:'';flex:1;height:1px;background:var(--b);}
</style>
</head>
<body>
<div class="w">

<div class="hdr">
  <div class="logo">🪪</div>
  <div>
    <div class="hdr-t">DL Scanner</div>
    <div class="hdr-s">PYTHON BACKEND · PDF417 + OCR · USA AAMVA</div>
  </div>
</div>

<div class="dz" id="dz"
     ondragover="event.preventDefault();this.classList.add('over')"
     ondragleave="this.classList.remove('over')"
     ondrop="onDrop(event)">
  <input type="file" id="fi" accept="image/*" onchange="onFile(event)">
  <div class="dz-ico">📷</div>
  <div class="dz-t1">Upload Driver's License</div>
  <div class="dz-t2">Back side preferred · JPG / PNG / HEIC</div>
</div>

<div class="prev" id="prev">
  <img id="pi" src="" alt="">
  <div class="btn-row">
    <button class="btn-ch" onclick="reset()">✕ Change</button>
    <button class="btn-sc" id="sb" onclick="doScan()" disabled>⚡ Scan PDF417</button>
  </div>
</div>

<div class="pg" id="pg">
  <div class="pb"><div class="pf" id="pf"></div></div>
  <div class="steps" id="stps"></div>
</div>

<div class="err-box" id="eb">
  <div class="err-t">❌ Error</div>
  <div class="err-m" id="em"></div>
</div>

<div class="src-banner" id="sb2">
  <div class="src-banner-top">
    <div class="src-banner-msg" id="srcMsg"></div>
    <div class="field-count" id="fc2">0</div>
  </div>
  <div class="quality-bar" id="qbar" style="display:none">
    <div class="qb-label">
      <span>Barcode quality</span>
      <span id="qval">—</span>
    </div>
    <div class="qb-track"><div class="qb-fill" id="qfill" style="width:0%"></div></div>
    <div class="quality-tip" id="qtip"></div>
  </div>
</div>

<div class="ann-section" id="annSec" style="display:none">
  <div class="ann-lbl">📍 Detected barcode regions</div>
  <img class="ann-img" id="annImg" src="" alt="">
</div>

<div class="pdf417-crop" id="pdf417Crop">
  <img id="pdf417CropImg" src="" alt="PDF417">
  <div class="pdf417-tag">PDF417 BARCODE</div>
</div>

<div class="crops-strip" id="cropsStrip"></div>

<div class="fields-wrap" id="fw" style="display:none">
  <div class="section-hdr">
    <span class="section-title">Extracted Fields</span>
    <button class="copy-btn" id="cpBtn" onclick="copyJSON()">Copy JSON</button>
  </div>
  <div class="fields-list" id="fl"></div>
</div>

<div class="raw-wrap" id="rw" style="display:none">
  <button class="raw-btn" onclick="toggleRaw()">📋 Show raw PDF417 data</button>
  <pre class="raw-pre" id="rp"></pre>
</div>

</div>
<script>
let file=null,extracted=null,rawPdf='';

const GROUPS = {
  'Identity':   ['DCS','DAC','DAD','DBB','DBC'],
  'Physical':   ['DAU','DAW','DAY','DAZ'],
  'License':    ['DAQ','DBA','DBD','_CLASS','DCB','DCD'],
  'Address':    ['DAG','DAH','DAI','DAJ','DAK','DCG'],
  'Document':   ['DCF','DCK','_ISSUER','DDK','DDL','_DOC','DDH','DDI','DDJ'],
  'Barcodes':   ['_CODE128','_PHONE','_URL'],
};
const GROUP_ICONS = {Identity:'👤',Physical:'📏',License:'🪪',Address:'🏠',Document:'📋',Barcodes:'📊'};
const HI_FIELDS = ['DAQ','DCF','DCK','_CODE128','_DOC'];

function onDrop(e){
  e.preventDefault();document.getElementById('dz').classList.remove('over');
  const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/'))loadFile(f);
}
function onFile(e){const f=e.target.files[0];if(f)loadFile(f);}

function loadFile(f){
  file=f;
  const r=new FileReader();
  r.onload=e=>{
    document.getElementById('pi').src=e.target.result;
    document.getElementById('prev').classList.add('show');
    document.getElementById('dz').style.display='none';
    document.getElementById('sb').disabled=false;
    clearResults();
  };
  r.readAsDataURL(f);
}

function reset(){
  file=null;
  document.getElementById('prev').classList.remove('show');
  document.getElementById('dz').style.display='';
  document.getElementById('fi').value='';
  document.getElementById('sb').disabled=true;
  clearResults();
}

function clearResults(){
  ['eb','sb2'].forEach(id=>document.getElementById(id).className=document.getElementById(id).className.replace('show','').trim());
  ['annSec','fw','rw','pdf417Crop'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('fl').innerHTML='';
  document.getElementById('cropsStrip').innerHTML='';
  document.getElementById('pg').classList.remove('show');
}

async function doScan(){
  if(!file)return;
  clearResults();
  document.getElementById('sb').disabled=true;
  startProgress();
  const fd=new FormData();fd.append('image',file);
  try{
    const res=await fetch('/scan',{method:'POST',body:fd});
    const data=await res.json();
    stopProgress(data.steps||[]);
    render(data);
  }catch(e){
    stopProgress([]);
    showErr('Backend connection failed: '+e.message);
  }finally{
    document.getElementById('sb').disabled=false;
  }
}

function render(d){
  if(!d.success){showErr(d.error||'Unknown error');return;}

  // Source banner
  const sb2=document.getElementById('sb2');
  sb2.className='src-banner show '+(d.source_type||'ocr');
  document.getElementById('srcMsg').textContent=d.source_msg||'';
  document.getElementById('fc2').textContent=(d.field_count||0)+' fields';

  // Quality bar (show when not pdf417 decoded)
  if(!d.has_pdf417 && d.module_px >= 0){
    const qbar=document.getElementById('qbar');
    qbar.style.display='block';
    const mp=d.module_px||0;
    document.getElementById('qval').textContent=mp>0?`${mp.toFixed(1)}px/module`:'undetected';
    // Score: 0px=0%, 3px=100%
    const pct=Math.min(100,Math.round(mp/3*100));
    const fill=document.getElementById('qfill');
    fill.style.width=pct+'%';
    fill.style.background=pct>=100?'#10b981':pct>=60?'#f59e0b':'#ef4444';
    let tip='';
    if(mp<=0) tip='📷 Place the license back-side up in good lighting.';
    else if(mp<1.5) tip=`📏 Photo too far away (${mp.toFixed(1)}px/module). Hold phone 15-20cm from the barcode.`;
    else if(mp<3) tip=`📏 Almost! (${mp.toFixed(1)}px/module). Move slightly closer for full PDF417 decode.`;
    else tip=`✅ Quality good! PDF417 should be decodable.`;
    document.getElementById('qtip').textContent=tip;
  }

  // Annotated card
  if(d.annotated_b64){
    document.getElementById('annSec').style.display='block';
    document.getElementById('annImg').src='data:image/jpeg;base64,'+d.annotated_b64;
  }

  // PDF417 crop
  if(d.pdf417_crop_b64){
    document.getElementById('pdf417Crop').classList.add('show');
    document.getElementById('pdf417CropImg').src='data:image/jpeg;base64,'+d.pdf417_crop_b64;
  }

  // Crop thumbnails
  const strip=document.getElementById('cropsStrip');
  (d.crops||[]).forEach(c=>{
    strip.innerHTML+=`<div class="crop-card"><img class="crop-img" src="data:image/jpeg;base64,${c.b64}" alt="${c.label}"><div class="crop-lbl">${c.label}</div></div>`;
  });

  // Fields
  extracted=d.fields||{};
  rawPdf=d.pdf417_raw||'';
  const keys=Object.keys(extracted);
  if(keys.length>0){
    document.getElementById('fw').style.display='block';
    renderFields(extracted);
  }

  if(rawPdf){
    document.getElementById('rw').style.display='block';
    document.getElementById('rp').textContent=rawPdf;
  }
}

function renderFields(fields){
  const list=document.getElementById('fl');
  list.innerHTML='';
  let delay=0;
  const rendered=new Set();

  for(const [grpName,keys] of Object.entries(GROUPS)){
    const visible=keys.filter(k=>fields[k]);
    if(!visible.length) continue;

    // Group divider
    const div=document.createElement('div');
    div.className='grp-divider';
    div.textContent=`${GROUP_ICONS[grpName]||''} ${grpName}`;
    list.appendChild(div);

    visible.forEach(k=>{
      rendered.add(k);
      list.appendChild(makeFieldCard(k,fields[k],delay));
      delay+=28;
    });
  }

  // Remaining ungrouped
  const others=Object.keys(fields).filter(k=>!rendered.has(k));
  if(others.length){
    const div=document.createElement('div');
    div.className='grp-divider';div.textContent='📋 Other';
    list.appendChild(div);
    others.forEach(k=>{list.appendChild(makeFieldCard(k,fields[k],delay));delay+=28;});
  }
}

function makeFieldCard(key,f,delay){
  const hi=HI_FIELDS.includes(key);
  const src=f.source||'ocr';
  const srcLabel=src==='pdf417'?'PDF417':src==='1d_barcode'||src==='barcode'?'1D':src==='ocr'?'OCR':'';
  const d=document.createElement('div');
  d.className='fc';
  d.style.animationDelay=delay+'ms';
  d.innerHTML=`
    <div class="fc-ico">${f.icon||'📋'}</div>
    <div class="fc-body">
      <div class="fc-lbl">${esc(f.label)}</div>
      <div class="fc-val${hi?' hi':''}">${esc(f.value)}</div>
    </div>
    ${srcLabel?`<div class="src-tag ${src}">${srcLabel}</div>`:''}`;
  return d;
}

function showErr(msg){
  const eb=document.getElementById('eb');
  eb.classList.add('show');
  document.getElementById('em').textContent=msg;
}

let pgTimer;
const STEP_NAMES=['card_extracted','regions','pdf417','ocr','fields','annotate','done'];
function startProgress(){
  document.getElementById('pg').classList.add('show');
  document.getElementById('stps').innerHTML=STEP_NAMES.map(s=>`<span class="step" id="st_${s}">${s}</span>`).join('');
  let i=0;
  pgTimer=setInterval(()=>{
    document.getElementById('pf').style.width=Math.min(92,(i/STEP_NAMES.length)*100)+'%';
    if(i>0){const p=document.getElementById('st_'+STEP_NAMES[i-1]);if(p)p.className='step dn';}
    const c=document.getElementById('st_'+STEP_NAMES[i]);if(c)c.className='step act';
    if(++i>=STEP_NAMES.length)clearInterval(pgTimer);
  },350);
}
function stopProgress(steps){
  clearInterval(pgTimer);
  document.getElementById('pf').style.width='100%';
  steps.forEach(s=>{
    const code=s.split(':')[0];
    const el=document.getElementById('st_'+code);
    if(el)el.className='step dn';
  });
}

function toggleRaw(){
  const p=document.getElementById('rp');
  p.style.display=p.style.display==='block'?'none':'block';
}
function copyJSON(){
  if(!extracted)return;
  const out={};
  for(const[k,v]of Object.entries(extracted))out[v.label]=v.value;
  navigator.clipboard.writeText(JSON.stringify(out,null,2)).then(()=>{
    const b=document.getElementById('cpBtn');
    b.textContent='✓ Copied!';b.style.color='var(--ok)';b.style.borderColor='var(--ok)';
    setTimeout(()=>{b.textContent='Copy JSON';b.style.color='';b.style.borderColor='';},2000);
  });
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body>
</html>
